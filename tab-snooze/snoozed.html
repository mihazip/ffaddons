<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Snoozed Tabs</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      color: #fff;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #999;
      margin-bottom: 30px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .empty-state-text {
      font-size: 18px;
    }

    .snoozed-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .snoozed-item {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.2s;
    }

    .snoozed-item:hover {
      border-color: #53a8b6;
      transform: translateX(4px);
    }

    .favicon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      border-radius: 4px;
    }

    .favicon-placeholder {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      background: #0f3460;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .tab-info {
      flex: 1;
      min-width: 0;
    }

    .tab-title {
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-url {
      font-size: 12px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .snooze-info {
      text-align: right;
      flex-shrink: 0;
    }

    .snooze-time {
      font-weight: 600;
      color: #53a8b6;
      margin-bottom: 4px;
    }

    .snooze-date {
      font-size: 12px;
      color: #999;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .action-btn {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .open-now-btn {
      background: #53a8b6;
      color: #fff;
    }

    .open-now-btn:hover {
      background: #4a96a3;
    }

    .delete-btn {
      background: #e74c3c;
      color: #fff;
    }

    .delete-btn:hover {
      background: #c0392b;
    }

    .stats {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }

    .stat-item {
      flex: 1;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #53a8b6;
    }

    .stat-label {
      font-size: 14px;
      color: #999;
      margin-top: 4px;
    }

    .recurring-badge {
      display: inline-block;
      background: #53a8b6;
      color: #fff;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: 8px;
      font-weight: 600;
      vertical-align: middle;
    }

    .recurring-info {
      font-size: 11px;
      color: #53a8b6;
      margin-top: 4px;
      font-style: italic;
    }

    .recurring-item {
      border-left: 3px solid #53a8b6;
    }
  </style>
</head>
<body>
  <h1>🌙 Snoozed Tabs</h1>
  <div class="subtitle">Manage your snoozed tabs</div>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-value" id="total-count">0</div>
      <div class="stat-label">Total Snoozed</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="today-count">0</div>
      <div class="stat-label">Due Today</div>
    </div>
  </div>

  <div id="snoozed-container">
    <!-- Snoozed tabs will be inserted here -->
  </div>

  <script src="snoozed.js"></script>
</body>
</html>
